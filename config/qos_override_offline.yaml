# QoS override for offline nuScenes bag playback.
# Usage: ros2 bag play <bag> --qos-profile-overrides-path config/qos_override_offline.yaml
#
# All topics are set to reliable to ensure consistent playback rate.
# For live sensor deployment, no override is needed as sensors publish directly.

# Camera images: reliable, depth 5
/nuscenes/cam_front/image_raw:
  reliability: reliable
  durability: volatile
  history: keep_last
  depth: 5

/nuscenes/cam_front_left/image_raw:
  reliability: reliable
  durability: volatile
  history: keep_last
  depth: 5

/nuscenes/cam_front_right/image_raw:
  reliability: reliable
  durability: volatile
  history: keep_last
  depth: 5

/nuscenes/cam_back/image_raw:
